<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PopZen - Bubble Wrap ASMR</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  transition: 0.3s;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(255,255,255,0.8);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 12px;
  padding: 20px;
}

/* BUBBLE */
.bubble {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #ccc);
  box-shadow: inset 0 5px 8px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: 0.2s;
}

.bubble:hover {
  transform: scale(1.1);
}

.bubble.popped {
  transform: scale(0.6);
  background: #999;
}

/* CONTROLS */
.controls, .themes {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 10px;
}

button {
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* THEMES */
.soft { background: linear-gradient(#fdfbfb,#ebedee); }

.night {
  background: linear-gradient(#0f2027,#203a43,#2c5364);
  color: white;
}
.night .bubble { background: radial-gradient(circle,#9be7ff,#003); }

.ocean {
  background: linear-gradient(#2193b0,#6dd5ed);
}
.ocean .bubble { background: radial-gradient(circle,#a0f0ff,#0077aa); }

.sunset {
  background: linear-gradient(#ff7e5f,#feb47b);
}
.sunset .bubble { background: radial-gradient(circle,#ffd1a1,#ff6a00); }

.forest {
  background: linear-gradient(#134e5e,#71b280);
}
.forest .bubble { background: radial-gradient(circle,#a8ff78,#3a7d44); }

.glass {
  background: #111;
  color: white;
}
.glass .bubble {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body class="soft">

<header>
  <div><b>PopZen</b></div>
  <div>Pops: <span id="score">0</span> | Time: <span id="time">0</span>s</div>
</header>

<div class="grid" id="grid"></div>

<div class="themes">
  <button onclick="setTheme('soft')">🌤 Soft</button>
  <button onclick="setTheme('night')">🌙 Night</button>
  <button onclick="setTheme('ocean')">🌊 Ocean</button>
  <button onclick="setTheme('sunset')">🌇 Sunset</button>
  <button onclick="setTheme('forest')">🌿 Forest</button>
  <button onclick="setTheme('glass')">💎 Glass</button>
</div>

<div class="controls">
  <button onclick="resetGrid()">🔁 Reset</button>
  <button onclick="popAll()">⚡ Pop All</button>
  <button onclick="toggleAuto()">🎮 Auto</button>
</div>

<script>
const grid = document.getElementById("grid");
let score = 0;
let time = 0;
let auto = false;

/* SOUND SYSTEM */
let sounds = [];
let audioUnlocked = false;

/* Unlock sound properly */
document.body.addEventListener("click", () => {
  if (!audioUnlocked) {
    sounds = [
      new Audio("sounds/soft-pop.mp3"),
      new Audio("sounds/deep-pop.mp3"),
      new Audio("sounds/crisp-pop.mp3"),
      new Audio("sounds/plastic-tap.mp3")
    ];
    audioUnlocked = true;
    console.log("Audio Ready");
  }
}, { once: true });

/* CREATE GRID */
function createGrid() {
  grid.innerHTML = "";

  for (let i = 0; i < 150; i++) {
    let bubble = document.createElement("div");
    bubble.classList.add("bubble");

    bubble.addEventListener("click", () => popBubble(bubble));
    bubble.addEventListener("mouseover", (e) => {
      if (e.buttons === 1) popBubble(bubble);
    });

    grid.appendChild(bubble);
  }
}

/* POP FUNCTION */
function popBubble(bubble) {
  if (bubble.classList.contains("popped")) return;

  bubble.classList.add("popped");

  if (audioUnlocked && sounds.length > 0) {
    let sound = sounds[Math.floor(Math.random() * sounds.length)];
    sound.currentTime = 0;
    sound.play().catch(()=>{});
  }

  if (navigator.vibrate) navigator.vibrate(8);

  score++;
  document.getElementById("score").innerText = score;
}

/* BUTTONS */
function popAll() {
  document.querySelectorAll(".bubble").forEach(b => popBubble(b));
}

function resetGrid() {
  score = 0;
  time = 0;
  document.getElementById("score").innerText = 0;
  document.getElementById("time").innerText = 0;
  createGrid();
}

function toggleAuto() {
  auto = !auto;
}

/* THEME SWITCH */
function setTheme(theme) {
  document.body.className = theme;
}

/* TIMER + AUTO MODE */
setInterval(() => {
  time++;
  document.getElementById("time").innerText = time;

  if (auto) {
    let bubbles = document.querySelectorAll(".bubble:not(.popped)");
    if (bubbles.length > 0) {
      let random = bubbles[Math.floor(Math.random() * bubbles.length)];
      popBubble(random);
    }
  }
}, 1000);

/* INIT */
createGrid();
</script>

</body>
</html>
